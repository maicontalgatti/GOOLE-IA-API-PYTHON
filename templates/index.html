<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA GOOGLE</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 24px;
            background: #f6f7fb;
        }

        #chat-container {
            max-width: 900px;
        }

        #chat-box {
            background: #fff;
            border: 1px solid #d8dbe3;
            border-radius: 8px;
            min-height: 320px;
            max-height: 560px;
            overflow-y: auto;
            padding: 12px;
            margin-bottom: 12px;
        }

        .message {
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .user-message {
            background: #e8f0fe;
            border: 1px solid #c9dafc;
        }

        .bot-message {
            background: #f3f4f6;
            border: 1px solid #e4e7ec;
        }

        #message-form {
            display: flex;
            gap: 8px;
        }

        #user-message {
            flex: 1;
            padding: 10px;
            border: 1px solid #cfd5e1;
            border-radius: 6px;
        }

        #send-button {
            padding: 10px 14px;
            border: 1px solid #cfd5e1;
            border-radius: 6px;
            background: #ffffff;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>Chat</h1>
    <div id="chat-container">
        <div id="chat-box">
            <!-- Aqui serão exibidas as mensagens -->
        </div>
        <form id="message-form">
            <input type="text" id="user-message" placeholder="Digite sua mensagem...">
            <button type="button" id="send-button">Enviar</button>

        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function () {
            // Captura o clique no botão "Enviar"
            $('#send-button').click(function (event) { 
                event.preventDefault(); // Impede o comportamento padrão de recarregar a página

                var userMessage = $('#user-message').val();
                sendMessage(userMessage);
            });

              // Captura a tecla Enter
            $('#user-message').keypress(function(event){
                if(event.which === 13){ // 13 é o código da tecla Enter
                    event.preventDefault(); // Impede o comportamento padrão de inserir uma quebra de linha
                    
                    var userMessage = $('#user-message').val();
                    sendMessage(userMessage);
                }
            });

            function sendMessage(message) {
                if (!message || !message.trim()) {
                    return;
                }

                // Exibe a mensagem do usuário no chat
                const userBubble = $('<div class="message user-message"></div>').text(message);
                $('#chat-box').append(userBubble);

                // Envia a mensagem para o servidor Flask
                $.ajax({
                    url: '/',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ message: message }),
                    success: function (response) {
                        // Exibe a resposta do servidor no chat
                        const botBubble = $('<div class="message bot-message"></div>').text(response);
                        $('#chat-box').append(botBubble);
                        $('#chat-box').scrollTop($('#chat-box')[0].scrollHeight);
                    },
                    error: function (error) {
                        console.log('Erro:', error);
                    }
                });

                // Limpa o campo de entrada após o envio da mensagem
                $('#user-message').val('');
            }
        });
    </script>
</body>

</html>
